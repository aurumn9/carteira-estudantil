<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação da Carteira</title>

    <link rel="stylesheet" href="style-validacao.css">
</head>

<body>

    <div class="container">

        <div class="card">

            <div class="icone">
                ✓
            </div>

            <h1>Carteira Válida</h1>

            <div class="foto-area">
                <img id="foto" src="" alt="Foto do aluno">
            </div>

            <div class="linha">
                <strong>Nome:</strong>
                <span id="nome"></span>
            </div>

            <div class="linha">
                <strong>Instituição:</strong>
                <span id="instituicao"></span>
            </div>

            <div class="linha">
                <strong>Curso:</strong>
                <span id="curso"></span>
            </div>

            <div class="linha">
                <strong>Matrícula:</strong>
                <span id="matricula"></span>
            </div>

            <div class="linha">
                <strong>CPF/CIN:</strong>
                <span id="cpf"></span>
            </div>

            <div class="linha">
                <strong>Nascimento:</strong>
                <span id="nascimento"></span>
            </div>

            <div class="linha">
                <strong>Validade:</strong>
                <span id="validade"></span>
            </div>

            <div class="status">
                STATUS:
                <span id="status"></span>
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
