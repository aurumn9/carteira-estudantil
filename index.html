<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteira Estudantil Digital</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="carteira">

    <div class="topo">

        <div class="logo-area">
            <img src="dne.png" class="logo-dne-img" alt="DNE">

            <div class="texto-dne">
                documento<br>
                nacional<br>
                do estudante
            </div>
        </div>

        <div class="logos">
            <img src="logo.webp" class="logo-entidades" alt="logos">
        </div>

    </div>

    <div class="nome" id="nome">
        Nome do Aluno
    </div>

    <div class="conteudo">

        <div class="coluna-foto">

            <img id="foto" src="" class="foto" alt="Foto">

            <div class="dados-pessoais">

                <p><strong>CPF/CIN:</strong>
                    <span id="cpf"></span>
                </p>

                <p><strong>Data nasc.:</strong>
                    <span id="nascimento"></span>
                </p>

                <div class="codigo">
                    <p><strong>Cod. uso / CIE:</strong>
                    <span id="matricula"></span>
                </p>

                </div>

            </div>

        </div>

        <div class="coluna-dados">

            <div class="campo">
                <div class="titulo">INSTITUIÇÃO</div>
                <div class="valor" id="instituicao"></div>
            </div>

            <div class="campo">
                <div class="titulo">CURSO</div>
                <div class="valor" id="curso"></div>
            </div>

            <div class="campo">
                <div class="titulo">MATRÍCULA</div>
                <div class="valor" id="matricula2"></div>
            </div>

            <div class="campo">
                <div class="titulo">VALIDADE</div>
                <div class="valor" id="validade"></div>
            </div>

        </div>

        <div class="coluna-qr">

            <img id="qrcode" src="qrcode.png" class="qrcode" alt="QR">

            <div class="ano">
                2026
            </div>

        </div>

    </div>

    <div class="rodape">
        Documento válido em todo o território nacional
    </div>

</div>

<script src="script-carteira.js"></script>

</body>
</html>
