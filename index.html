<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteira Estudantil Digital</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="carteira">

    <div class="topo">

        <div class="logo-area">

            <img src="dne.png" class="logo-dne-img" alt="DNE">

            <div class="texto-dne">
                documento<br>
                nacional<br>
                do estudante
            </div>

        </div>

        <div class="logos">
            <img src="logo.webp" class="logo-entidades" alt="UBES UNE ANPG">
        </div>

    </div>

    <div class="nome">
        João da Silva
    </div>

    <div class="conteudo">

        <div class="coluna-foto">

            <img src="foto.jpg" class="foto" alt="Foto">

            <div class="dados-pessoais">

                <p><strong>CPF/CIN:</strong> 999.999.999-99</p>

                <p><strong>Data nasc.:</strong> 01/01/2000</p>

                <div class="codigo">
                <p><strong>Cod. uso / CIE:</strong> 786-AM4F6</p>
                </div>

            </div>

        </div>

        <div class="coluna-dados">

            <div class="campo">
                <div class="titulo">INSTITUIÇÃO</div>
                <div class="valor">Universidade Exemplo</div>
            </div>

            <div class="campo">
                <div class="titulo">CURSO</div>
                <div class="valor">Engenharia Civil</div>
            </div>

            <div class="campo">
                <div class="titulo">MATRÍCULA</div>
                <div class="valor">20260001</div>
            </div>

            <div class="campo">
                <div class="titulo">VALIDADE</div>
                <div class="valor">31/12/2026</div>
            </div>

        </div>

        <div class="coluna-qr">

            <img src="qrcode.png" class="qrcode" alt="QR Code">

            <div class="ano">
                2026
            </div>

        </div>

    </div>

    <div class="rodape">
        Documento válido em todo o território nacional
    </div>

</div>

</body>
</html>
